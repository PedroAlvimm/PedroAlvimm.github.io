<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Curr&iacute;culo | Pedro Augusto</title>
    <meta
      name="description"
      content="Curr&iacute;culo atualizado de Pedro Augusto, gerado a partir dos dados do portf&oacute;lio."
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #101010;
        --muted: #404040;
        --line: #111111;
        --soft: #f5f5f5;
        --accent: #4f46e5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #e8e8e8;
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.38;
      }

      a {
        color: inherit;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid #d4d4d4;
        background: rgba(255, 255, 255, 0.92);
        padding: 0.85rem;
        backdrop-filter: blur(14px);
      }

      .toolbar a,
      .toolbar button {
        min-height: 2.55rem;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        background: #ffffff;
        color: #111111;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 0.62rem 0.9rem;
        text-decoration: none;
      }

      .toolbar .primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .page {
        width: min(100%, 900px);
        min-height: 1120px;
        margin: 1.5rem auto;
        background: #ffffff;
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.18);
        padding: 38px 46px;
      }

      .resume-header {
        text-align: center;
      }

      .resume-header h1 {
        margin: 0;
        font-size: 2.3rem;
        line-height: 1;
        text-transform: uppercase;
      }

      .resume-header p {
        margin: 0.35rem 0;
        color: var(--muted);
      }

      .contact-line {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem 0.8rem;
        justify-content: center;
        margin-top: 0.6rem;
        font-size: 0.9rem;
      }

      .resume-section {
        margin-top: 1.15rem;
      }

      .resume-section h2 {
        margin: 0 0 0.7rem;
        border-bottom: 2px solid var(--line);
        padding-bottom: 0.22rem;
        font-size: 1.02rem;
        text-transform: uppercase;
      }

      .resume-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) max-content;
        gap: 1rem;
        margin-bottom: 0.82rem;
      }

      .resume-item h3 {
        margin: 0;
        font-size: 0.98rem;
        text-transform: uppercase;
      }

      .resume-item .sub {
        margin: 0.08rem 0 0;
        color: var(--muted);
        font-style: italic;
      }

      .resume-item .meta {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: right;
        white-space: nowrap;
      }

      ul {
        margin: 0.42rem 0 0;
        padding-left: 1.1rem;
      }

      li {
        margin: 0.18rem 0;
      }

      .compact-grid {
        display: grid;
        grid-template-columns: 9.5rem minmax(0, 1fr);
        gap: 0.3rem 0.65rem;
      }

      .compact-grid dt {
        font-weight: 800;
      }

      .compact-grid dd {
        margin: 0;
      }

      .summary {
        margin: 0;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .page {
          margin: 0;
          padding: 28px 18px;
          box-shadow: none;
        }

        .resume-item {
          grid-template-columns: 1fr;
          gap: 0.2rem;
        }

        .resume-item .meta {
          text-align: left;
          white-space: normal;
        }

        .compact-grid {
          grid-template-columns: 1fr;
        }
      }

      @media print {
        @page {
          size: A4;
          margin: 10mm;
        }

        body {
          background: #ffffff;
        }

        .toolbar {
          display: none;
        }

        .page {
          width: auto;
          min-height: auto;
          margin: 0;
          box-shadow: none;
          padding: 0;
        }

        .resume-section {
          break-inside: avoid;
        }

        .resume-item {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar" aria-label="A&ccedil;&otilde;es do curr&iacute;culo">
      <a href="index.html#resume">Voltar ao portf&oacute;lio</a>
      <button class="primary" type="button" id="print-resume">Imprimir / salvar PDF</button>
      <button type="button" id="download-resume">Baixar TXT atualizado</button>
    </div>

    <main class="page" id="resume-root" aria-label="Curr&iacute;culo gerado"></main>

    <script src="assets/portfolio-data.js?v=20260705-layout-3"></script>
    <script src="assets/curriculo-generator.js?v=20260705-layout-3"></script>
  </body>
</html>
